/* ===== স্টোর ক্লাস ===== */
function Store(){this.LOCAL_KEY='dokan_hisab_data';this.data=null;this.uid=null;this.isFirebaseMode=false;this.ready=false;this._activating=false;}
Store.prototype.init=function(){
  var self=this;
  return new Promise(function(resolve){
    auth.onAuthStateChanged(async function(user){
      if(user){
        await self.activateSession(user);
        resolve(true);
      }else{
        self.uid=null;self.isFirebaseMode=false;self.ready=false;
        showAuthScreen();
        resolve(false);
      }
    });
  });
};
/* বাগ ফিক্স #১ ও #২: লগইন/রেজিস্টার এর পরে সরাসরি এই ফাংশন কল করে স্ক্রিন পরিবর্তন করা হয়,
   onAuthStateChanged এর উপর সম্পূর্ণ নির্ভর না করে। যদি onAuthStateChanged পরে আবার ফায়ার করে,
   _activating/ready গার্ডের কারণে ডাটা দ্বিতীয়বার লোড হবে না, শুধু showApp() রি-কল হবে (নিরাপদ)। */
Store.prototype.activateSession=async function(user){
  if(this._activating)return;
  if(this.uid===user.uid&&this.ready&&this.isFirebaseMode){showApp();return;}
  this._activating=true;
  try{
    this.uid=user.uid;this.isFirebaseMode=true;
    await this._loadFromFirebase();
    this.ready=true;
    showApp();
  }finally{
    this._activating=false;
  }
};
Store.prototype.initLocal=function(){this.isFirebaseMode=false;this.data=this._loadLocal();if(!this.data||!this.data.settings){this.data=this._getDefaultData();this._saveLocal();}this.ready=true;};
Store.prototype._loadFromFirebase=async function(){try{var doc=await db.collection('users').doc(this.uid).get();if(doc.exists){this.data=doc.data();}else{var ld=this._loadLocal();if(ld&&ld.transactions&&ld.transactions.length>0){this.data=ld;delete this.data._initialized;await this._saveToFirebase();toast('পুরানো ডেটা ক্লাউডে মাইগ্রেট হয়েছে','info');}else{this.data=this._getDefaultData();await this._saveToFirebase();}}}catch(e){console.error('Firebase load error:',e);this.data=this._loadLocal()||this._getDefaultData();updateSyncStatus('offline');}};
Store.prototype._saveToFirebase=async function(){if(!this.uid||!this.isFirebaseMode)return;try{await db.collection('users').doc(this.uid).set(this.data,{merge:true});updateSyncStatus('synced');}catch(e){console.error('Firebase save error:',e);this._saveLocal();updateSyncStatus('offline');}};
Store.prototype._loadLocal=function(){try{var r=localStorage.getItem(this.LOCAL_KEY);return r?JSON.parse(r):null;}catch(e){return null;}};
Store.prototype._saveLocal=function(){try{localStorage.setItem(this.LOCAL_KEY,JSON.stringify(this.data));}catch(e){}};
Store.prototype._getDefaultData=function(){return{settings:{shopName:'মোবাইল কম্পিউটার সেন্টার',openingBalance:0,theme:'light'},services:[{id:'s1',name:'কম্পিউটার কম্পোজ',defaultPrice:30},{id:'s2',name:'ছবি প্রিন্ট (A4)',defaultPrice:10},{id:'s3',name:'ফটোকপি (A4)',defaultPrice:3},{id:'s4',name:'ফটোকপি (Legal)',defaultPrice:5},{id:'s5',name:'লেমিনেশন',defaultPrice:20},{id:'s6',name:'ফর্ম ফিলাপ',defaultPrice:50},{id:'s7',name:'ফাইল ডাউনলোড',defaultPrice:20},{id:'s8',name:'স্ক্যান',defaultPrice:15},{id:'s9',name:'ইমেইল/অনলাইন আবেদন',defaultPrice:30},{id:'s10',name:'ছবি প্রিন্ট (Passport)',defaultPrice:8}],expenseCategories:[{id:'e1',name:'দোকান ভাড়া'},{id:'e2',name:'বিদ্যুৎ বিল'},{id:'e3',name:'ইন্টারনেট বিল'},{id:'e4',name:'কালি ক্রয়'},{id:'e5',name:'কাগজ ক্রয়'},{id:'e6',name:'টোনার ক্রয়'},{id:'e7',name:'প্রিন্টার মেরামত/পার্টস'},{id:'e8',name:'স্টাফ বেতন'},{id:'e9',name:'অন্যান্য খরচ'}],transactions:[],duePayments:[]};};
Store.prototype._persist=function(){return this.isFirebaseMode?this._saveToFirebase():this._saveLocal();};
Store.prototype.getSettings=function(){return this.data.settings;};
Store.prototype.updateSettings=async function(o){Object.assign(this.data.settings,o);await this._persist();};
Store.prototype.getServices=function(){return this.data.services;};
Store.prototype.addService=async function(s){this.data.services.push({id:genId(),name:s.name,defaultPrice:s.defaultPrice});await this._persist();};
Store.prototype.updateService=async function(id,o){var i=this.data.services.findIndex(function(s){return s.id===id;});if(i>-1)Object.assign(this.data.services[i],o);await this._persist();};
Store.prototype.deleteService=async function(id){this.data.services=this.data.services.filter(function(s){return s.id!==id;});await this._persist();};
Store.prototype.getExpenseCategories=function(){return this.data.expenseCategories;};
Store.prototype.addExpenseCategory=async function(c){this.data.expenseCategories.push({id:genId(),name:c.name});await this._persist();};
Store.prototype.deleteExpenseCategory=async function(id){this.data.expenseCategories=this.data.expenseCategories.filter(function(c){return c.id!==id;});await this._persist();};
Store.prototype.getTransactions=function(f){f=f||{};var txns=this.data.transactions.slice();if(f.type&&f.type!=='all')txns=txns.filter(function(t){return t.type===f.type;});if(f.paymentStatus&&f.paymentStatus!=='all')txns=txns.filter(function(t){return t.paymentStatus===f.paymentStatus;});if(f.dateFrom)txns=txns.filter(function(t){return t.date>=f.dateFrom;});if(f.dateTo)txns=txns.filter(function(t){return t.date<=f.dateTo;});if(f.search){var s=f.search.toLowerCase();txns=txns.filter(function(t){return(t.customerName&&t.customerName.toLowerCase().includes(s))||(t.serviceName&&t.serviceName.toLowerCase().includes(s))||(t.productName&&t.productName.toLowerCase().includes(s))||(t.expenseCategory&&t.expenseCategory.toLowerCase().includes(s))||(t.note&&t.note.toLowerCase().includes(s));});}txns.sort(function(a,b){return b.timestamp-a.timestamp;});return txns;};
Store.prototype.getTransactionById=function(id){return this.data.transactions.find(function(t){return t.id===id;});};
Store.prototype.addTransaction=async function(tx){tx.id=genId();tx.timestamp=tx.timestamp||new Date(tx.date).getTime();this.data.transactions.push(tx);await this._persist();return tx;};
Store.prototype.updateTransaction=async function(id,o){var i=this.data.transactions.findIndex(function(t){return t.id===id;});if(i>-1)Object.assign(this.data.transactions[i],o);await this._persist();};
Store.prototype.deleteTransaction=async function(id){this.data.transactions=this.data.transactions.filter(function(t){return t.id!==id;});this.data.duePayments=this.data.duePayments.filter(function(dp){return dp.transactionId!==id;});await this._persist();};
Store.prototype.addDuePayment=async function(tid,amt,dt){var dp={id:genId(),transactionId:tid,amount:Number(amt),date:dt||todayStr(),timestamp:Date.now()};this.data.duePayments.push(dp);var tx=this.getTransactionById(tid);if(tx){tx.paidAmount=(tx.paidAmount||0)+Number(amt);tx.dueAmount=Math.max(0,tx.total-tx.paidAmount);tx.paymentStatus=tx.dueAmount<=0?'cash':'partial';}await this._persist();return dp;};
Store.prototype.getDuePayments=function(tid){return this.data.duePayments.filter(function(dp){return dp.transactionId===tid;});};
Store.prototype.getTodayStats=function(){var td=todayStr(),txns=this.data.transactions.filter(function(t){return t.date===td;});return{income:txns.filter(function(t){return t.type!=='expense';}).reduce(function(s,t){return s+(t.paidAmount||0);},0),expense:txns.filter(function(t){return t.type==='expense';}).reduce(function(s,t){return s+t.total;},0)};};
Store.prototype.getCashBalance=function(){var c=this.data.transactions.filter(function(t){return t.type!=='expense';}).reduce(function(s,t){return s+(t.paidAmount||0);},0);var e=this.data.transactions.filter(function(t){return t.type==='expense';}).reduce(function(s,t){return s+t.total;},0);return this.data.settings.openingBalance+c-e;};
Store.prototype.getTotalDue=function(){return this.data.transactions.filter(function(t){return t.dueAmount>0;}).reduce(function(s,t){return s+t.dueAmount;},0);};
Store.prototype.getDueByCustomer=function(){var map={};this.data.transactions.filter(function(t){return t.dueAmount>0;}).forEach(function(t){var n=t.customerName||'অজানা গ্রাহক';if(!map[n])map[n]={customerName:n,totalDue:0,transactions:[]};map[n].totalDue+=t.dueAmount;map[n].transactions.push(t);});return Object.values(map).sort(function(a,b){return b.totalDue-a.totalDue;});};
Store.prototype.getLastTransactions=function(n){n=n||15;return this.data.transactions.slice().sort(function(a,b){return b.timestamp-a.timestamp;}).slice(0,n);};
Store.prototype.getLast7DaysStats=function(){var days=[];for(var i=6;i>=0;i--){var d=daysAgo(i),dt=this.data.transactions.filter(function(t){return t.date===d;}),inc=dt.filter(function(t){return t.type!=='expense';}).reduce(function(s,t){return s+t.total;},0),exp=dt.filter(function(t){return t.type==='expense';}).reduce(function(s,t){return s+t.total;},0),dd=new Date(d);days.push({date:d,label:dd.getDate()+'/'+(dd.getMonth()+1),income:inc,expense:exp});}return days;};
Store.prototype.getMonthlyStats=function(y,m){var p=y+'-'+String(m).padStart(2,'0'),txns=this.data.transactions.filter(function(t){return t.date.startsWith(p);}),si=txns.filter(function(t){return t.type==='service';}).reduce(function(s,t){return s+t.total;},0),pi=txns.filter(function(t){return t.type==='product';}).reduce(function(s,t){return s+t.total;},0),ti=si+pi,ec={};txns.filter(function(t){return t.type==='expense';}).forEach(function(t){var c=t.expenseCategory||'অন্যান্য';ec[c]=(ec[c]||0)+t.total;});var te=Object.values(ec).reduce(function(s,v){return s+v;},0),np=ti-te,db=[],dim=new Date(y,m,0).getDate();for(var d=1;d<=dim;d++){var ds=p+'-'+String(d).padStart(2,'0'),dt=txns.filter(function(t){return t.date===ds;}),inc=dt.filter(function(t){return t.type!=='expense';}).reduce(function(s,t){return s+t.total;},0),exp=dt.filter(function(t){return t.type==='expense';}).reduce(function(s,t){return s+t.total;},0);if(inc>0||exp>0)db.push({date:ds,income:inc,expense:exp,net:inc-exp});}var med=txns.filter(function(t){return t.dueAmount>0;}).reduce(function(s,t){return s+t.dueAmount;},0);return{serviceIncome:si,productIncome:pi,totalIncome:ti,expensesByCategory:ec,totalExpense:te,netProfit:np,dailyBreakdown:db,monthEndDue:med,totalTxns:txns.length};};
Store.prototype.exportData=function(){var e=Object.assign({},this.data);delete e._initialized;return JSON.stringify(e,null,2);};
Store.prototype.importData=async function(js){try{var d=JSON.parse(js);if(!d.settings||!d.transactions||!Array.isArray(d.services))throw 0;this.data=d;await this._persist();return true;}catch(e){return false;}};
Store.prototype.clearAllData=async function(){this.data=this._getDefaultData();await this._persist();};

/* ===== অথেন্টিকেশন (বাগ ফিক্স #১, #২) ===== */
function toggleAuthMode(){isRegisterMode=!isRegisterMode;document.getElementById('authSubtitle').textContent=isRegisterMode?'নতুন অ্যাকাউন্ট তৈরি করুন':'লগইন করুন আপনার অ্যাকাউন্টে';document.getElementById('authBtnText').textContent=isRegisterMode?'রেজিস্টার':'লগইন';document.getElementById('authToggleText').textContent=isRegisterMode?'অ্যাকাউন্ট আছে?':'অ্যাকাউন্ট নেই?';document.getElementById('authToggleLink').textContent=isRegisterMode?'লগইন করুন':'নতুন অ্যাকাউন্ট তৈরি করুন';document.getElementById('confirmPassGroup').style.display=isRegisterMode?'block':'none';document.getElementById('authError').style.display='none';document.getElementById('authSuccess').style.display='none';}
function showAuthError(m){var e=document.getElementById('authError');e.textContent=m;e.style.display='block';}
async function handleAuth(){
  var email=document.getElementById('authEmail').value.trim(),pw=document.getElementById('authPassword').value;
  document.getElementById('authError').style.display='none';
  document.getElementById('authSuccess').style.display='none';
  if(!email||!pw){showAuthError('ইমেইল ও পাসওয়ার্ড দিন');return;}
  if(pw.length<6){showAuthError('পাসওয়ার্ড কমপক্ষে ৬ অক্ষরের হতে হবে');return;}
  if(isRegisterMode&&pw!==document.getElementById('authConfirmPass').value){showAuthError('দুটি পাসওয়ার্ড মিলছে না');return;}
  var btn=document.getElementById('authSubmitBtn');btn.disabled=true;document.getElementById('authBtnText').textContent=isRegisterMode?'তৈরি হচ্ছে...':'লগইন হচ্ছে...';
  try{
    if(isRegisterMode){
      var cred=await auth.createUserWithEmailAndPassword(email,pw);
      /* বাগ ফিক্স #১: ভেরিফিকেশন ইমেইল পাঠানো হচ্ছে — আগে এটি কখনো কল করা হতো না তাই কোনো মেইল যেত না */
      try{
        await cred.user.sendEmailVerification();
        document.getElementById('authSuccess').innerHTML='<i class="fas fa-check-circle"></i> অ্যাকাউন্ট তৈরি সফল! ভেরিফিকেশন ইমেইল পাঠানো হয়েছে (ইনবক্স/স্প্যাম চেক করুন)। লোড হচ্ছে...';
      }catch(veErr){
        console.error('Verification email send failed:',veErr);
        document.getElementById('authSuccess').innerHTML='<i class="fas fa-check-circle"></i> অ্যাকাউন্ট তৈরি সফল! (ভেরিফিকেশন ইমেইল পাঠানো যায়নি, পরে সেটিংস থেকে চেষ্টা করুন) লোড হচ্ছে...';
      }
      document.getElementById('authSuccess').style.display='block';
      /* বাগ ফিক্স #১, #২: onAuthStateChanged এর জন্য অপেক্ষা না করে সরাসরি সেশন চালু করা হচ্ছে,
         যাতে স্ক্রিন রিফ্রেশ ছাড়াই তাৎক্ষণিকভাবে অ্যাপে প্রবেশ করা যায় */
      await store.activateSession(cred.user);
    }else{
      var cred2=await auth.signInWithEmailAndPassword(email,pw);
      await store.activateSession(cred2.user);
    }
    return; /* সফল হলে স্ক্রিন পরিবর্তন হয়ে গেছে, বাটন রিসেট করার দরকার নেই */
  }catch(e){
    var m='একটি সমস্যা হয়েছে';
    if(e.code==='auth/email-already-in-use')m='এই ইমেইল দিয়ে আগেই অ্যাকাউন্ট আছে। লগইন করুন।';
    else if(e.code==='auth/invalid-email')m='সঠিক ইমেইল দিন';
    else if(e.code==='auth/invalid-credential')m='ইমেইল বা পাসওয়ার্ড ভুল';
    else if(e.code==='auth/user-not-found')m='এই ইমেইলে কোনো অ্যাকাউন্ট নেই';
    else if(e.code==='auth/too-many-requests')m='অনেকবার চেষ্টা করেছেন, কিছুক্ষণ পর আবার চেষ্টা করুন';
    else if(e.code==='auth/network-request-failed')m='ইন্টারনেট সংযোগ নেই';
    else if(e.code==='auth/weak-password')m='পাসওয়ার্ড খুবই দুর্বল, শক্তিশালী পাসওয়ার্ড দিন';
    showAuthError(m);
  }
  btn.disabled=false;document.getElementById('authBtnText').textContent=isRegisterMode?'রেজিস্টার':'লগইন';
}

async function saveTransaction(){clearErrors();var v=true,tx={};if(newTxnTab==='service'){var sel=document.getElementById('svcSelect'),svc=store.getServices().find(function(s){return s.id===sel.value;});if(!svc){showError('errSvc','svcSelect');v=false;}var qty=parseFloat(document.getElementById('svcQty').value),price=parseFloat(document.getElementById('svcPrice').value);if(!qty||qty<1){showError('errSvcQty','svcQty');v=false;}if(!price||price<1){showError('errSvcPrice','svcPrice');v=false;}if(!v)return;tx={type:'service',serviceName:svc.name,quantity:qty,unitPrice:price,total:qty*price};}else if(newTxnTab==='product'){var nm=document.getElementById('prodName').value.trim(),qty=parseFloat(document.getElementById('prodQty').value),price=parseFloat(document.getElementById('prodPrice').value);if(!nm){showError('errProdName','prodName');v=false;}if(!qty||qty<1){showError('errProdQty','prodQty');v=false;}if(!price||price<1){showError('errProdPrice','prodPrice');v=false;}if(!v)return;tx={type:'product',productName:nm,quantity:qty,unitPrice:price,total:qty*price};}else{var cs=document.getElementById('expCat'),cat=store.getExpenseCategories().find(function(c){return c.id===cs.value;}),amt=parseFloat(document.getElementById('expAmount').value),dt=document.getElementById('expDate').value;if(!cat){showError('errExpCat','expCat');v=false;}if(!amt||amt<1){showError('errExpAmount','expAmount');v=false;}if(!dt){showError('errExpDate','expDate');v=false;}if(!v)return;tx={type:'expense',expenseCategory:cat.name,total:amt,customerName:'',paymentStatus:'cash',paidAmount:amt,dueAmount:0,date:dt,timestamp:new Date(dt).getTime(),note:document.getElementById('expNote').value.trim()};if(editTxnId){await store.updateTransaction(editTxnId,tx);toast('খরচ আপডেট হয়েছে');}else{await store.addTransaction(tx);toast('খরচ সংরক্ষিত হয়েছে');}renderNewTransaction();return;}var dt=document.getElementById('txDate').value,ps=(document.querySelector('input[name="payStatus"]:checked')||{}).value||'cash';if(!dt){showError('errDate','txDate');return;}tx.customerName=document.getElementById('txCustomer').value.trim();tx.date=dt;tx.timestamp=new Date(dt).getTime();tx.note=document.getElementById('txNote').value.trim();tx.paymentStatus=ps;tx.paidAmount=ps==='cash'?tx.total:0;tx.dueAmount=ps==='cash'?0:tx.total;if(editTxnId){var old=store.getTransactionById(editTxnId);if(old&&ps!=='cash'){var ap=old.paidAmount||0;tx.paidAmount=ap;tx.dueAmount=Math.max(0,tx.total-ap);if(tx.dueAmount<=0){tx.paymentStatus='cash';tx.paidAmount=tx.total;tx.dueAmount=0;}else if(ap>0){tx.paymentStatus='partial';}else{tx.paymentStatus='due';}}await store.updateTransaction(editTxnId,tx);toast('লেনদেন আপডেট হয়েছে');editTxnId=null;}else{await store.addTransaction(tx);toast('লেনদেন সংরক্ষিত হয়েছে');}renderNewTransaction();}

function confirmDeleteService(id,nm){openModal('সেবা মুছুন','<p>"<strong>'+esc(nm)+'</strong>" মুছে ফেলতে চান?</p>','<button class="btn btn-outline" onclick="closeModal()">বাতিল</button><button class="btn btn-danger" onclick="doDeleteService(\''+id+'\')"><i class="fas fa-trash"></i> মুছুন</button>');}
async function doDeleteService(id){await store.deleteService(id);closeModal();toast('মুছে ফেলা হয়েছে');renderSettings();}
function showAddCategoryModal(){openModal('নতুন ক্যাটাগরি','<div class="form-group"><label class="form-label">ক্যাটাগরির নাম *</label><input type="text" class="form-input" id="newCatName" placeholder="মেরামত খরচ"></div>','<button class="btn btn-outline" onclick="closeModal()">বাতিল</button><button class="btn btn-primary" onclick="addCategory()"><i class="fas fa-plus"></i> যোগ করুন</button>');}
async function addCategory(){var nm=document.getElementById('newCatName').value.trim();if(!nm){toast('নাম দিন','error');return;}await store.addExpenseCategory({name:nm});closeModal();toast('ক্যাটাগরি যোগ হয়েছে');renderSettings();}
function confirmDeleteCategory(id,nm){openModal('ক্যাটাগরি মুছুন','<p>"<strong>'+esc(nm)+'</strong>" মুছে ফেলতে চান?</p>','<button class="btn btn-outline" onclick="closeModal()">বাতিল</button><button class="btn btn-danger" onclick="doDeleteCategory(\''+id+'\')"><i class="fas fa-trash"></i> মুছুন</button>');}
async function doDeleteCategory(id){await store.deleteExpenseCategory(id);closeModal();toast('মুছে ফেলা হয়েছে');renderSettings();}
function downloadBackup(){var json=store.exportData(),b=new Blob([json],{type:'application/json'}),l=document.createElement('a');l.href=URL.createObjectURL(b);l.download='dokan-hisab-backup-'+todayStr()+'.json';l.click();toast('ব্যাকআপ ডাউনলোড সম্পন্ন');}
async function restoreBackup(ev){var f=ev.target.files[0];if(!f)return;var r=new FileReader();r.onload=async function(e){if(await store.importData(e.target.result)){toast('ডেটা রিস্টোর হয়েছে');applyTheme();updateSidebarName();handleRoute();}else{toast('সঠিক ব্যাকআপ ফাইল নয়','error');}};r.readAsText(f);ev.target.value='';}
function confirmClearAll(){openModal('সব ডেটা মুছে ফেলুন','<p style="color:var(--danger);font-weight:600;">এটি পূর্বাবস্থায় ফেরানো যাবে না!</p><p style="margin-top:8px;">নিশ্চিত করতে লিখুন: <strong>DELETE</strong></p><input type="text" class="form-input" id="confirmDeleteInput" placeholder="DELETE" style="margin-top:8px;">','<button class="btn btn-outline" onclick="closeModal()">বাতিল</button><button class="btn btn-danger" onclick="processClearAll()"><i class="fas fa-trash"></i> সব মুছুন</button>');}
async function processClearAll(){if(document.getElementById('confirmDeleteInput').value!=='DELETE'){toast('"DELETE" লিখুন','warning');return;}await store.clearAllData();closeModal();toast('সব ডেটা মুছে ফেলা হয়েছে');updateSidebarName();handleRoute();}

/* ===== রাউটার ===== */
function handleRoute(){var hash=location.hash||'#/',path=hash.replace('#','')||'/';document.querySelectorAll('#sidebarNav a').forEach(function(a){a.classList.toggle('active',a.getAttribute('data-route')===path);});document.getElementById('sidebar').classList.remove('mobile-show');document.getElementById('mobileOverlay').classList.remove('show');if(path==='/')renderDashboard();else if(path==='/new')renderNewTransaction();else if(path.indexOf('/edit/')===0)renderNewTransaction(path.replace('/edit/',''));else if(path==='/history')renderHistory();else if(path==='/dues')renderDues();else if(path==='/report')renderReport();else if(path==='/settings')renderSettings();else renderDashboard();window.scrollTo(0,0);}
window.addEventListener('hashchange',handleRoute);

/* ===== অ্যাপ ইনিশিয়ালাইজ ===== */
(async function(){
  await store.init();
})();
</script>
</body>
